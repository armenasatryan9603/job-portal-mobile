<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Send Feedback - HopWork</title>
    <meta
      name="description"
      content="Share your feedback and ideas to help us improve HopWork."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Crect%20width='100'%20height='100'%20rx='20'%20fill='%236366f1'/%3E%3Ctext%20x='50'%20y='64'%20font-size='44'%20text-anchor='middle'%20fill='white'%20font-family='Arial'%20font-weight='700'%3EHW%3C/text%3E%3C/svg%3E"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        line-height: 1.6;
        color: #1f2937;
        background: #ffffff;
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      h1 {
        font-size: 1.75rem;
        margin-bottom: 0.5rem;
        color: #4f46e5;
      }
      p {
        margin-bottom: 1rem;
      }
      .back {
        display: inline-block;
        margin-bottom: 2rem;
        font-weight: 500;
        color: #4f46e5;
        text-decoration: none;
      }
      .back:hover {
        text-decoration: underline;
      }
      form {
        margin-top: 1.5rem;
        border: 1px solid #e5e7eb;
        border-radius: 0.75rem;
        padding: 1.5rem;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      label {
        display: block;
        margin-bottom: 0.35rem;
        font-weight: 500;
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-family: inherit;
      }
      textarea {
        resize: vertical;
        min-height: 120px;
      }
      button {
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        color: #ffffff;
        padding: 0.875rem 2rem;
        border: none;
        border-radius: 0.5rem;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <a href="index.html" class="back">← Back to Home</a>

    <h1>Send Feedback</h1>
    <p>
      We’d love to hear your thoughts about HopWork. Share your ideas, feature
      requests, or anything that will help us improve the experience.
    </p>

    <form
      onsubmit="event.preventDefault(); alert('Thank you for your feedback!'); this.reset();"
    >
      <div class="form-group">
        <label for="type">Feedback type</label>
        <select id="type" name="type">
          <option value="idea">Idea / Feature Request</option>
          <option value="issue">Issue / Bug</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="message">Your feedback</label>
        <textarea
          id="message"
          name="message"
          placeholder="Tell us what’s on your mind..."
          required
        ></textarea>
      </div>
      <button type="submit">Submit Feedback</button>
    </form>
  </body>
</html>
